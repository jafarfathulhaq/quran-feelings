<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #F8F8FA;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Content wrapper ── */
    .content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Headline ── */
    .headline {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 28px;
    }
    .headline-top {
      color: #1A1A1A;
      display: block;
    }
    .headline-bottom {
      color: #2A7C6F;
      display: block;
    }

    /* ── Teal divider ── */
    .divider {
      width: 36px;
      height: 2px;
      background: #2A7C6F;
      opacity: 0.6;
      border-radius: 1px;
      margin-bottom: 32px;
    }

    /* ── Mode indicators ── */
    .modes {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-bottom: 52px;
    }
    .mode {
      font-size: 18px;
      color: #8E8E93;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mode-emoji {
      font-size: 20px;
    }

    /* ── Branding footer ── */
    .branding {
      font-size: 24px;
      font-weight: 600;
      color: #AAAAAA;
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="headline">
      <span class="headline-top">Temukan</span>
      <span class="headline-bottom">Al-Qur'an</span>
    </div>

    <div class="divider"></div>

    <div class="modes">
      <span class="mode"><span class="mode-emoji">🤲</span> Curhat</span>
      <span class="mode"><span class="mode-emoji">📖</span> Panduan</span>
      <span class="mode"><span class="mode-emoji">📜</span> Jelajahi</span>
    </div>
  </div>

  <div class="branding">TemuQuran.com</div>
</body>
</html>
